# NodePort so the dashboard is reachable from outside the cluster
# (browser → http://<any-k3s-node>:30080).
apiVersion: v1
kind: Service
metadata:
  name: iot-frontend
  namespace: iot
  labels:
    app: iot-frontend
spec:
  type: NodePort
  selector:
    app: iot-frontend
  ports:
    - name: http
      port: 8000
      targetPort: http
      nodePort: 30080
